# Linux: network_mode: host — container dùng chung mạng với host (VPN/route giống máy thật).
# Chiếm cổng trực tiếp trên máy: 3000 (frontend), 5000 (backend), 27017 (mongo), 4444 (selenium), 7900 (VNC).
# Trên Windows/macOS Docker Desktop không hỗ trợ host network đầy đủ; dùng Linux hoặc compose bridge riêng.

services:
  frontend:
    build: ./frontend
    network_mode: host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backend
    network_mode: host
    volumes:
      - ./backend:/app
    environment:
      - MONGO_URI=mongodb://127.0.0.1:27017/kpi_db
      - SELENIUM_URL=http://127.0.0.1:4444/wd/hub
    depends_on:
      mongodb:
        condition: service_healthy
      selenium:
        condition: service_started

  mongodb:
    image: mongo:8.2
    network_mode: host
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    command: ["mongod", "--bind_ip_all", "--wiredTigerCacheSizeGB", "0.5"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://127.0.0.1:27017/admin", "--eval", "db.adminCommand({ ping: 1 }).ok && quit(0)"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

  selenium:
    image: selenium/standalone-chrome:latest
    network_mode: host
    shm_size: 2gb

volumes:
  mongodb_data:
