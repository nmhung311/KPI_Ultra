services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - MONGO_URI=mongodb://mongodb:27017/kpi_db
      - SELENIUM_URL=http://selenium:4444/wd/hub
    depends_on:
      mongodb:
        condition: service_healthy
      selenium:
        condition: service_started

  mongodb:
    # Volume đã ở featureCompatibilityVersion 8.2 — cần image >= 8.2 (không dùng 7.x).
    image: mongo:8.2
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    command: ["mongod", "--bind_ip_all", "--wiredTigerCacheSizeGB", "0.5"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://127.0.0.1:27017/admin", "--eval", "db.adminCommand({ ping: 1 }).ok && quit(0)"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

  selenium:
    image: selenium/standalone-chrome:latest
    shm_size: 2gb
    ports:
      - "4444:4444"
      - "7900:7900" # VNC port để xem live (nếu cần)

volumes:
  mongodb_data:
